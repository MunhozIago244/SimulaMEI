name: CNAE official source monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 1 * *'

jobs:
  cnae-official-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check official CNAE sources
        run: npm run cnae:check

      - name: Upload CNAE reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cnae-official-source-report
          path: |
            data/cnae/latest.json
            data/cnae/source-manifest.json
            data/cnae/reports/*.json
